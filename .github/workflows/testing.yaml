name: Automatic testing
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ dev, main ]
jobs:
  python-unit-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
    - uses: actions/checkout@v5
    - name: python-setup
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: install-dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatch uv
    # One interpreter per job, so run the default hatch env's test script.
    - name: Run unit tests
      run: hatch run test

  playwright:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    # node / python
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: python-setup
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    # pip install dependencies for building beaker
    - name: install-dependencies
      run: |
        python -m pip install --upgrade pip
        pip install hatch uv
    # install npm packages in ts packages
    # Note: always install beaker-ts first as it is a dependency of beaker-vue
    - name: beaker-ts npm install
      working-directory: beaker-ts
      run: npm install
    - name: beaker-vue npm install
      working-directory: beaker-vue
      run: npm install
    # make beaker package
    - name: make build
      run: make build
    # install
    - name: install beaker
      # uv for CI speed at the cost of diverging from
      # dependency resolution backtracking in pip
      run: uv pip install --system -e .
    # install playwright
    - name: Install Playwright Browsers
      working-directory: beaker-vue
      shell: bash
      run: npx playwright install --with-deps
    # run beaker
    - name: Run Beaker
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        beaker notebook &
        sleep 15
    # with beaker listening on localhost:8888, run tests
    - name: Run Playwright tests
      working-directory: beaker-vue
      run: npx playwright test
    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: beaker-vue/playwright-report/
        retention-days: 30
